name: build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build_macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'zulu'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          validate-wrappers: true
      - name: Build with Gradle
        run: ./gradlew build
      - name: Save test results
        uses: actions/upload-artifact@v7
        with:
          name: test-results-macos
          path: build/reports/tests

  build_linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'zulu'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          validate-wrappers: true
      - name: Build with Gradle
        run: ./gradlew build
      - name: Save test results
        uses: actions/upload-artifact@v7
        with:
          name: test-results-linux
          path: build/reports/tests

  build_windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'zulu'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          validate-wrappers: true
      - name: Build with Gradle
        run: ./gradlew build
      - name: Save test results
        uses: actions/upload-artifact@v7
        with:
          name: test-results-windows
          path: build/reports/tests
