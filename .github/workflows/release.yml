name: release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

jobs:
  build_macosArm:
    runs-on: macos-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
      - name: Set up JDK 17
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5
        with:
          java-version: '17'
          distribution: 'zulu'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6
        with:
          validate-wrappers: true
      - name: Build with Gradle
        run: ./gradlew macosArm64Binaries
      - name: Attest build provenance
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2
        with:
          subject-path: build/bin/macosArm64/releaseExecutable/ktools.kexe
      - name: Upload macos Arm build
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: macos-arm-build
          path: build/bin/macosArm64/releaseExecutable/ktools.kexe

  build_macosX64:
    runs-on: macos-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
      - name: Set up JDK 17
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5
        with:
          java-version: '17'
          distribution: 'zulu'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6
        with:
          validate-wrappers: true
      - name: Build with Gradle
        run: ./gradlew macosX64Binaries
      - name: Attest build provenance
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2
        with:
          subject-path: build/bin/macosX64/releaseExecutable/ktools.kexe
      - name: Upload macos X64 build
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: macos-x64-build
          path: build/bin/macosX64/releaseExecutable/ktools.kexe

  build_linuxX64:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
      - name: Set up JDK 17
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5
        with:
          java-version: '17'
          distribution: 'zulu'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6
        with:
          validate-wrappers: true
      - name: Build with Gradle
        run: ./gradlew linuxX64Binaries
      - name: Attest build provenance
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2
        with:
          subject-path: build/bin/linuxX64/releaseExecutable/ktools.kexe
      - name: Upload linux X64 build
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: linux-x64-build
          path: build/bin/linuxX64/releaseExecutable/ktools.kexe

  build_windowsX64:
    runs-on: windows-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
      - name: Set up JDK 17
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5
        with:
          java-version: '17'
          distribution: 'zulu'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6
        with:
          validate-wrappers: true
      - name: Build with Gradle
        run: ./gradlew mingwX64Binaries
      - name: Attest build provenance
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2
        with:
          subject-path: build/bin/mingwX64/releaseExecutable/ktools.exe
      - name: Upload windows X64 build
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: windows-x64-build
          path: build/bin/mingwX64/releaseExecutable/ktools.exe

  release:
    permissions:
      contents: write
    needs:
      - "build_macosArm"
      - "build_macosX64"
      - "build_linuxX64"
      - "build_windowsX64"
    runs-on: ubuntu-latest
    steps:
      - name: Download all builds
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: build
      - name: Rename builds
        run: |
          mv build/macos-arm-build/ktools.kexe build/macos-arm-build/macos-arm-ktools.kexe
          mv build/macos-x64-build/ktools.kexe build/macos-x64-build/macos-x64-ktools.kexe
          mv build/linux-x64-build/ktools.kexe build/linux-x64-build/linux-x64-ktools.kexe
          mv build/windows-x64-build/ktools.exe build/windows-x64-build/windows-x64-ktools.exe
      - name: Generate SHA256SUMS
        working-directory: build
        run: |
          mkdir -p flat
          cp macos-arm-build/macos-arm-ktools.kexe flat/
          cp macos-x64-build/macos-x64-ktools.kexe flat/
          cp linux-x64-build/linux-x64-ktools.kexe flat/
          cp windows-x64-build/windows-x64-ktools.exe flat/
          (cd flat && sha256sum * > ../SHA256SUMS)
          rm -rf flat
      - name: Make Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3
        with:
          files: |
            build/macos-arm-build/macos-arm-ktools.kexe
            build/macos-x64-build/macos-x64-ktools.kexe
            build/linux-x64-build/linux-x64-ktools.kexe
            build/windows-x64-build/windows-x64-ktools.exe
            build/SHA256SUMS
